<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .nav a {
      color: #38bdf8;
      margin-right: 16px;
      text-decoration: none;
      font-weight: bold;
    }
    .card {
      background: #1e293b;
      padding: 14px;
      border-radius: 12px;
      margin-top: 12px;
    }
    .muted {
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/alerts">Alerts</a>
    <a href="/logs">Logs</a>
    <a href="/settings">Settings</a>
  </div>

  <h2>Logs</h2>
  <div id="logsBox">Loading...</div>

  <script>
    async function loadLogs() {
      const box = document.getElementById("logsBox");

      try {
        const res = await fetch("/api/logs");
        const data = await res.json();

        if (!data || data.length === 0) {
          box.innerHTML = "<p>No logs found.</p>";
          return;
        }

        box.innerHTML = data.map(item => `
          <div class="card">
            <div><strong>${item.event || "Event"}</strong></div>
            <div class="muted">Location: ${item.location || "-"}</div>
            <div class="muted">Status: ${item.status || "-"}</div>
            <div class="muted">Time: ${item.created_at || "-"}</div>
          </div>
        `).join("");
      } catch (err) {
        box.innerHTML = "<p>Failed to load logs.</p>";
        console.error(err);
      }
    }

    loadLogs();
    setInterval(loadLogs, 5000);
  </script>
</body>
</html>
